<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Example</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background-color: #fff;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    overflow: hidden;
    text-align: center;
  }

  .card img {
    width: 100%;
    height: auto;
  }

  .card h2 {
    margin: 15px 0 5px 0;
    color: #333;
  }

  .card p {
    color: #777;
    margin: 0 15px 15px 15px;
    font-size: 14px;
  }

  .card button {
    background-color: #007BFF;
    color: #fff;
    border: none;
    margin-bottom: 15px;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
  }

  .card button:hover {
    background-color: #0056b3;
  }
</style>
</head>
<body>

<div class="card">
  <img src="./a.png" alt="Card Image">
  <h2>John Doe</h2>
  <p>Web Developer & Designer. Loves creating beautiful interfaces and seamless user experiences.</p>
  <button>Contact</button>
</div>

</body>
</html>
